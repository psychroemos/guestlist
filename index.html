            color: #fff;

            text-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .couple-names .amp {
            font-style: italic;
            font-weight: 400;
            color: #f0d4d8;
            margin: 0 6px;
        }

        .wedding-subtitle {
            font-family: 'Lato', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #f0d4d8;
            margin-top: 8px;
            font-weight: 300;
        }

        /* ── Search Section ── */

            top: 0;
            z-index: 100;
            background: #fff;
            padding: 16px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .search-wrapper {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: #c4868e;
        }

        .search-input {
            width: 100%;
            padding: 14px 16px 14px 46px;
            border: 2px solid #e8d4d8;
            border-radius: 50px;
            font-size: 1rem;
            font-family: 'Lato', sans-serif;
            color: #3a2e2e;
            background: #fdf6f7;
            transition: all 0.3s ease;
            outline: none;
        }

        .search-input:focus {
            border-color: #c4868e;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(196,134,142,0.15);
        }

        .search-input::placeholder {
            color: #c9a8ad;
        }

        .clear-btn {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 1.3rem;
            color: #c4868e;
            cursor: pointer;
            display: none;
            padding: 4px 8px;
            line-height: 1;
        }

        .clear-btn.visible {
            display: block;
        }

        .search-results-dropdown {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            max-height: 300px;
            overflow-y: auto;
            display: none;
            z-index: 200;
        }

        .search-results-dropdown.active {
            display: block;
        }

        .search-result-item {
            padding: 14px 20px;
            cursor: pointer;
            border-bottom: 1px solid #f0e0e2;
            transition: background 0.15s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-result-item:last-child {
            border-bottom: none;
        }

        .search-result-item:hover,
        .search-result-item:active {
            background: #fdf2f4;
        }

        .search-result-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .search-result-name mark {
            background: #f5c4ca;
            color: inherit;
            border-radius: 2px;
            padding: 0 2px;
        }

        .search-result-table {
            font-size: 0.8rem;
            color: #fff;
            background: #c4868e;
            padding: 3px 10px;
            border-radius: 20px;
            white-space: nowrap;
            font-weight: 600;
        }

        .no-results {
            padding: 20px;
            text-align: center;
            color: #c9a8ad;
            font-style: italic;
        }

        /* ── Guest Count ── */
        .guest-count {
            text-align: center;
            padding: 16px 20px 4px;
            font-size: 0.85rem;
            color: #c4868e;
            letter-spacing: 1px;
        }

        /* ── Table Sections ── */
        .tables-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 10px 16px 40px;
        }

        .table-group {
            margin-bottom: 20px;
        }

        .table-header {
            background: linear-gradient(135deg, #b5707a, #c4868e);
            color: #fff;
            padding: 14px 20px;
            border-radius: 14px 14px 0 0;
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 0.5px;
        }

        .table-header .seat-count {
            font-family: 'Lato', sans-serif;
            font-size: 0.75rem;
            background: rgba(255,255,255,0.2);
            padding: 3px 12px;
            border-radius: 20px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .guest-list {
            background: #fff;
            border-radius: 0 0 14px 14px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .guest-item {
            padding: 14px 20px;
            border-bottom: 1px solid #f5e6e8;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.3s ease;
        }

        .guest-item:last-child {
            border-bottom: none;
        }

        .guest-number {
            width: 28px;
            height: 28px;
            background: #f0dce0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: #b5707a;
            flex-shrink: 0;
        }

        .guest-name {
            font-size: 0.95rem;
            font-weight: 400;
            flex: 1;
        }

        /* ── Seated Button ── */
        .seated-btn {
            padding: 6px 14px;
            border: 2px solid #c4868e;
            border-radius: 20px;
            background: transparent;
            color: #c4868e;
            font-family: 'Lato', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            flex-shrink: 0;
            text-transform: uppercase;
        }

        .seated-btn:hover {
            background: #fce8eb;
        }

        .seated-btn:active {
            transform: scale(0.95);
        }

        .guest-item.seated .seated-btn {
            background: #5a9a6e;
            border-color: #5a9a6e;
            color: #fff;
        }

        .guest-item.seated .guest-name {
            color: #5a9a6e;
            font-weight: 600;
        }

        .guest-item.seated .guest-number {
            background: #d4edda;
            color: #5a9a6e;
        }

        /* ── Seated counter in header ── */
        .seated-counter {
            font-family: 'Lato', sans-serif;
            font-size: 0.7rem;
            background: rgba(255,255,255,0.25);
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 400;
            margin-left: 8px;
        }

        .seated-counter.all-seated {
            background: #5a9a6e;
        }

        .table-header-info {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .guest-item.highlight {
            background: #fce8eb;
            animation: pulseHighlight 2s ease-out;
        }

        @keyframes pulseHighlight {
            0% { background: #f5c4ca; }
            100% { background: #fce8eb; }
        }

        .guest-item.highlight .guest-name {
            font-weight: 700;
            color: #8b4a55;
        }

        .guest-item.highlight .guest-number {
            background: #c4868e;
            color: #fff;
        }

        .guest-item {
            position: relative;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .guest-item.drag-ready {
            background: #fef3f4;
            box-shadow: 0 0 0 2px #c4868e inset;
            cursor: grab;
        }

        .guest-item.dragging {
            opacity: 0.5;
            background: #fce8eb;
        }

        .guest-item.drag-over {
            border-top: 3px solid #c4868e;
        }

            display: none;
        }

            display: none;
            background: #b5707a;
            color: #fff;
            text-align: center;
            padding: 12px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .drag-mode-banner.visible {
            display: block;
        }

        .move-btns {
            display: none;
            gap: 4px;
            flex-shrink: 0;
        }

        .guest-item.drag-ready .move-btns {
            display: flex;
        }

        .guest-item.drag-ready .seated-btn {
            display: none;
        }

            width: 32px;
            height: 32px;
            border: 2px solid #c4868e;
            border-radius: 8px;
            background: #fff;
            color: #c4868e;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            padding: 0;
            line-height: 1;
        }

        .move-btn:active {
            background: #c4868e;
            color: #fff;
            transform: scale(0.9);
        }

            text-align: center;
            padding: 20px;
            color: #c9a8ad;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .footer .heart {
            color: #d4a0a7;
            font-size: 1rem;
        }

            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 48px;
            height: 48px;
            background: #c4868e;
            color: #fff;
            border: none;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 50;
        }

        .scroll-top.visible {
            display: flex;
        }

        .scroll-top:hover {
            background: #a8707a;
            transform: scale(1.05);
        }

            .search-input { font-size: 0.95rem; padding: 12px 14px 12px 42px; }
        }

        @media (min-width: 768px) {

            .header { padding: 40px 20px 30px; }
        }

        /* ── Smooth scrolling ── */
        html {
            scroll-behavior: smooth;
        }

        /* ── Overlay to close dropdown ── */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 99;
        }

        .overlay.active {
            display: block;
        }

        let db = null;

        try {
            if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
                firebase.initializeApp(firebaseConfig);

            console.warn('Firebase not configured. Using local storage only.', e);

        // ── Seated state (persists in localStorage + syncs via Firebase) ──
        const STORAGE_KEY = 'wedding_seated_guests';
        let seatedGuests = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

        function saveSeatedState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(seatedGuests));
            if (firebaseReady && seatedRef) {
                seatedRef.set(seatedGuests);
            }
        }

        // ── Listen for real-time changes from Firebase ──
        if (firebaseReady && seatedRef) {
            seatedRef.on('value', (snapshot) => {
                const data = snapshot.val() || {};
                seatedGuests = data;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(seatedGuests));
                refreshSeatedUI();
            });
        }

        function refreshSeatedUI() {
            // Update each guest item in the DOM without full rebuild
            document.querySelectorAll('.guest-item').forEach(item => {
                const guestKey = item.getAttribute('data-guest');
                const btn = item.querySelector('.seated-btn');
                if (seatedGuests[guestKey]) {
                    item.classList.add('seated');
                    if (btn) btn.textContent = '\u2713 Seated';
                } else {
                    item.classList.remove('seated');
                    if (btn) btn.textContent = 'Seated';
                }
            });
            updateSeatedCounters();
        }

        // ── DOM Elements ──
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearBtn');
        const searchDropdown = document.getElementById('searchDropdown');
        const tablesContainer = document.getElementById('tablesContainer');
        const guestCountEl = document.getElementById('guestCount');
        const overlay = document.getElementById('overlay');
        const scrollTopBtn = document.getElementById('scrollTopBtn');

        // ── Build table groups ──
        function buildTables() {
            const tables = {};
            guests.forEach(g => {
                if (!tables[g.table]) tables[g.table] = [];
                tables[g.table].push(g.name);
            });

            // Custom sort: Presidential A, Presidential B, then Table 1-19
            const tableOrder = (name) => {
                if (name === 'Presidential A') return -2;
                if (name === 'Presidential B') return -1;
                const match = name.match(/\d+/);
                return match ? parseInt(match[0]) : 0;
            };
            const sortedTableNames = Object.keys(tables).sort((a, b) => tableOrder(a) - tableOrder(b));
            let html = '';

            sortedTableNames.forEach(tableName => {
                const tableGuests = tables[tableName];
                const tableId = tableName.toLowerCase().replace(/\s+/g, '-');
                const seatedCount = tableGuests.filter(n => seatedGuests[n.toLowerCase()]).length;
                const allSeated = seatedCount === tableGuests.length;
                html += `
                    <div class="table-group" id="table-${tableId}">
                        <div class="table-header">
                            <span>${tableName}</span>
                            <div class="table-header-info">
                                <span class="seat-count">${tableGuests.length} guest${tableGuests.length > 1 ? 's' : ''}</span>
                                <span class="seated-counter${allSeated ? ' all-seated' : ''}" data-table-counter="${tableId}">${seatedCount}/${tableGuests.length} seated</span>
                            </div>
                        </div>
                        <div class="guest-list">
                            ${tableGuests.map((name, i) => {
                                const isSeated = seatedGuests[name.toLowerCase()] || false;
                                return `
                                <div class="guest-item${isSeated ? ' seated' : ''}" data-guest="${name.toLowerCase()}">
                                    <span class="guest-number">${i + 1}</span>
                                    <span class="guest-name">${name}</span>
                                    <button class="seated-btn" data-guest-key="${name.toLowerCase()}">${isSeated ? '✓ Seated' : 'Seated'}</button>
                                </div>
                            `}).join('')}
                        </div>
                    </div>
                `;
            });

            tablesContainer.innerHTML = html;
            const totalSeated = Object.values(seatedGuests).filter(Boolean).length;
            guestCountEl.textContent = `${guests.length} Guests · ${sortedTableNames.length} Tables · ${totalSeated} Arrived`;
        }

        // ── Search functionality ──
        function handleSearch() {
            const query = searchInput.value.trim().toLowerCase();
            clearBtn.classList.toggle('visible', query.length > 0);

            if (query.length === 0) {
                closeDropdown();
                return;
            }

            const matches = guests.filter(g => g.name.toLowerCase().includes(query));

            if (matches.length === 0) {
                searchDropdown.innerHTML = '<div class="no-results">No guests found</div>';
            } else {
                searchDropdown.innerHTML = matches.map(g => {
                    const highlightedName = highlightMatch(g.name, query);
                    return `
                        <div class="search-result-item" data-guest="${g.name.toLowerCase()}" data-table="${g.table}">
                            <span class="search-result-name">${highlightedName}</span>
                            <span class="search-result-table">${g.table}</span>
                        </div>
                    `;
                }).join('');
            }

            searchDropdown.classList.add('active');
            overlay.classList.add('active');
        }

        function highlightMatch(name, query) {
            const idx = name.toLowerCase().indexOf(query);
            if (idx === -1) return name;
            return name.slice(0, idx) + '<mark>' + name.slice(idx, idx + query.length) + '</mark>' + name.slice(idx + query.length);
        }

        function closeDropdown() {
            searchDropdown.classList.remove('active');
            overlay.classList.remove('active');
        }

        function scrollToGuest(guestName, tableNum) {
            closeDropdown();
            searchInput.value = '';
            clearBtn.classList.remove('visible');

            // Remove previous highlights
            document.querySelectorAll('.guest-item.highlight').forEach(el => {
                el.classList.remove('highlight');
            });

            // Find and highlight the guest
            const guestEl = document.querySelector(`.guest-item[data-guest="${guestName}"]`);
            if (guestEl) {
                // Scroll to the table group first
                const tableId = tableNum.toLowerCase().replace(/\s+/g, '-');
                const tableGroup = document.getElementById(`table-${tableId}`);
                if (tableGroup) {
                    const yOffset = -140; // account for sticky search bar
                    const y = tableGroup.getBoundingClientRect().top + window.pageYOffset + yOffset;
                    window.scrollTo({ top: y, behavior: 'smooth' });
                }

                // Highlight after scroll
                setTimeout(() => {
                    guestEl.classList.add('highlight');
                    // Ensure the specific guest is visible
                    guestEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 400);

                // Remove highlight after a while
                setTimeout(() => {
                    guestEl.classList.remove('highlight');
                }, 5000);
            }
        }

        // ── Seated toggle ──
        tablesContainer.addEventListener('click', (e) => {
            const btn = e.target.closest('.seated-btn');
            if (!btn) return;

            const guestKey = btn.getAttribute('data-guest-key');
            const guestItem = btn.closest('.guest-item');

            if (seatedGuests[guestKey]) {
                delete seatedGuests[guestKey];
                guestItem.classList.remove('seated');
                btn.textContent = 'Seated';
            } else {
                seatedGuests[guestKey] = true;
                guestItem.classList.add('seated');
                btn.textContent = '✓ Seated';
            }

            saveSeatedState();
            updateSeatedCounters();
        });

        function updateSeatedCounters() {
            // Update table-level counters
            document.querySelectorAll('.table-group').forEach(group => {
                const items = group.querySelectorAll('.guest-item');
                const seated = group.querySelectorAll('.guest-item.seated');
                const tableId = group.id.replace('table-', '');
                const counter = group.querySelector('.seated-counter');
                if (counter) {
                    counter.textContent = `${seated.length}/${items.length} seated`;
                    counter.classList.toggle('all-seated', seated.length === items.length);
                }
            });

            // Update global count
            const totalSeated = Object.values(seatedGuests).filter(Boolean).length;
            const tableCount = document.querySelectorAll('.table-group').length;
            guestCountEl.textContent = `${guests.length} Guests · ${tableCount} Tables · ${totalSeated} Arrived`;
        }

        // ── Event Listeners ──
        searchInput.addEventListener('input', handleSearch);

        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            clearBtn.classList.remove('visible');
            closeDropdown();
            searchInput.focus();
        });

        searchDropdown.addEventListener('click', (e) => {
            const item = e.target.closest('.search-result-item');
            if (item) {
                const guestName = item.getAttribute('data-guest');
                const tableNum = item.getAttribute('data-table');
                scrollToGuest(guestName, tableNum);
            }
        });

        overlay.addEventListener('click', () => {
            closeDropdown();
        });

        // Close dropdown on escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeDropdown();
                searchInput.blur();
            }
        });

        // Scroll-to-top button
        window.addEventListener('scroll', () => {
            scrollTopBtn.classList.toggle('visible', window.scrollY > 300);
        });

        scrollTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // ── Initialize ──
        buildTables();

        // ── Long-press Drag & Reorder ──
        const dragBanner = document.getElementById('dragBanner');
        let dragMode = false;
        let dragItem = null;
        let dragList = null;

        // ── 4-tap activation ──
        let tapCount = 0;
        let tapTimer = null;
        let tapTarget = null;
        const TAPS_REQUIRED = 4;
        const TAP_WINDOW = 2000;

        // ── Tap 4 times on a guest name to activate drag mode (secret) ──
        tablesContainer.addEventListener('click', (e) => {
            if (e.target.closest('.seated-btn')) return;
            if (e.target.closest('.move-btn')) return;
            if (dragMode) return;

            const item = e.target.closest('.guest-item');
            if (!item) return;

            if (tapTarget !== item) {
                tapCount = 0;
                tapTarget = item;
            }

            tapCount++;

            if (tapTimer) clearTimeout(tapTimer);
            tapTimer = setTimeout(() => {
                tapCount = 0;
                tapTarget = null;
                tapTimer = null;
            }, TAP_WINDOW);

            if (tapCount >= TAPS_REQUIRED) {
                activateDragMode(item);
                tapCount = 0;
                tapTarget = null;
                if (tapTimer) { clearTimeout(tapTimer); tapTimer = null; }
            }
        });

        function activateDragMode(item) {
            dragMode = true;
            dragBanner.classList.add('visible');

            const list = item.closest('.guest-list');
            if (!list) return;
            dragList = list;

            // Add move buttons and mark items as drag-ready
            list.querySelectorAll('.guest-item').forEach(gi => {
                gi.classList.add('drag-ready');
                gi.setAttribute('draggable', 'true');
                // Add move up/down buttons if not already there
                if (!gi.querySelector('.move-btns')) {
                    const btns = document.createElement('div');
                    btns.className = 'move-btns';
                    btns.innerHTML = '<button class="move-btn move-up" title="Move up">▲</button><button class="move-btn move-down" title="Move down">▼</button>';
                    gi.appendChild(btns);
                }
            });

            if (navigator.vibrate) navigator.vibrate(100);
        }

        function deactivateDragMode() {
            dragMode = false;
            dragItem = null;
            dragList = null;
            dragBanner.classList.remove('visible');

            document.querySelectorAll('.guest-item.drag-ready').forEach(gi => {
                gi.classList.remove('drag-ready', 'dragging', 'drag-over');
                gi.removeAttribute('draggable');
                const btns = gi.querySelector('.move-btns');
                if (btns) btns.remove();
            });
        }

        dragBanner.addEventListener('click', deactivateDragMode);

        // ── Move up/down button clicks ──
        tablesContainer.addEventListener('click', (e) => {
            if (!dragMode || !dragList) return;
            const moveBtn = e.target.closest('.move-btn');
            if (!moveBtn) return;

            const item = moveBtn.closest('.guest-item');
            if (!item) return;

            if (moveBtn.classList.contains('move-up')) {
                const prev = item.previousElementSibling;
                if (prev) {
                    prev.before(item);
                    renumberList(dragList);
                    saveGuestOrder(dragList);
                    item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            } else if (moveBtn.classList.contains('move-down')) {
                const next = item.nextElementSibling;
                if (next) {
                    next.after(item);
                    renumberList(dragList);
                    saveGuestOrder(dragList);
                    item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }
        });

        // ── Drag events ──
        tablesContainer.addEventListener('dragstart', (e) => {
            if (!dragMode) { e.preventDefault(); return; }
            const item = e.target.closest('.guest-item');
            if (!item || !item.classList.contains('drag-ready')) { e.preventDefault(); return; }
            dragItem = item;
            item.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', '');
        });

        tablesContainer.addEventListener('dragover', (e) => {
            if (!dragMode || !dragItem) return;
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';

            const target = e.target.closest('.guest-item');
            // Clear previous drag-over
            if (dragList) {
                dragList.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
            }
            if (target && target !== dragItem && target.classList.contains('drag-ready')) {
                target.classList.add('drag-over');
            }
        });

        tablesContainer.addEventListener('dragleave', (e) => {
            const target = e.target.closest('.guest-item');
            if (target) target.classList.remove('drag-over');
        });

        tablesContainer.addEventListener('drop', (e) => {
            e.preventDefault();
            if (!dragMode || !dragItem || !dragList) return;

            const target = e.target.closest('.guest-item');
            if (target && target !== dragItem && target.classList.contains('drag-ready')) {
                // Determine position
                const items = [...dragList.querySelectorAll('.guest-item')];
                const dragIdx = items.indexOf(dragItem);
                const dropIdx = items.indexOf(target);

                if (dragIdx < dropIdx) {
                    target.after(dragItem);
                } else {
                    target.before(dragItem);
                }

                // Renumber
                renumberList(dragList);
                // Save order to Firebase
                saveGuestOrder(dragList);
            }

            dragItem.classList.remove('dragging');
            if (dragList) dragList.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
            dragItem = null;
        });

        tablesContainer.addEventListener('dragend', (e) => {
            if (dragItem) dragItem.classList.remove('dragging');
            if (dragList) dragList.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
            dragItem = null;
        });

        // ── Touch-based drag for mobile ──
        let touchDragItem = null;
        let touchClone = null;
        let touchStartY = 0;
        let touchCurrentTarget = null;

        tablesContainer.addEventListener('touchstart', (e) => {
            if (!dragMode) return;
            const item = e.target.closest('.guest-item');
            if (!item || !item.classList.contains('drag-ready') || e.target.closest('.seated-btn')) return;

            touchDragItem = item;
            touchStartY = e.touches[0].clientY;
            item.classList.add('dragging');
        }, { passive: true });

        tablesContainer.addEventListener('touchmove', (e) => {
            if (!dragMode || !touchDragItem || !dragList) return;
            e.preventDefault();

            const touch = e.touches[0];
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            const targetItem = target ? target.closest('.guest-item') : null;

            dragList.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));

            if (targetItem && targetItem !== touchDragItem && targetItem.classList.contains('drag-ready')) {
                targetItem.classList.add('drag-over');
                touchCurrentTarget = targetItem;
            } else {
                touchCurrentTarget = null;
            }
        }, { passive: false });

        tablesContainer.addEventListener('touchend', (e) => {
            if (!dragMode || !touchDragItem || !dragList) return;

            if (touchCurrentTarget && touchCurrentTarget !== touchDragItem) {
                const items = [...dragList.querySelectorAll('.guest-item')];
                const dragIdx = items.indexOf(touchDragItem);
                const dropIdx = items.indexOf(touchCurrentTarget);

                if (dragIdx < dropIdx) {
                    touchCurrentTarget.after(touchDragItem);
                } else {
                    touchCurrentTarget.before(touchDragItem);
                }

                renumberList(dragList);
                saveGuestOrder(dragList);
            }

            touchDragItem.classList.remove('dragging');
            dragList.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
            touchDragItem = null;
            touchCurrentTarget = null;
        });

        function renumberList(list) {
            list.querySelectorAll('.guest-item').forEach((item, i) => {
                const num = item.querySelector('.guest-number');
                if (num) num.textContent = i + 1;
            });
        }

        function saveGuestOrder(list) {
            const tableGroup = list.closest('.table-group');
            if (!tableGroup) return;
            const tableId = tableGroup.id.replace('table-', '');
            const order = [...list.querySelectorAll('.guest-item')].map(item => item.getAttribute('data-guest'));

            // Save to localStorage
            const orderData = JSON.parse(localStorage.getItem('wedding_guest_order') || '{}');
            orderData[tableId] = order;
            localStorage.setItem('wedding_guest_order', JSON.stringify(orderData));

            // Save to Firebase
            if (firebaseReady && db) {
                db.ref('guestOrder/' + tableId).set(order);
            }
        }

        // ── Apply saved order on load ──
        function applySavedOrder() {
            const orderData = JSON.parse(localStorage.getItem('wedding_guest_order') || '{}');
            Object.keys(orderData).forEach(tableId => {
                const tableGroup = document.getElementById('table-' + tableId);
                if (!tableGroup) return;
                const list = tableGroup.querySelector('.guest-list');
                if (!list) return;
                const order = orderData[tableId];
                const items = [...list.querySelectorAll('.guest-item')];
                const itemMap = {};
                items.forEach(item => { itemMap[item.getAttribute('data-guest')] = item; });

                order.forEach(guestKey => {
                    if (itemMap[guestKey]) list.appendChild(itemMap[guestKey]);
                });
                renumberList(list);
            });
        }
        applySavedOrder();

        // ── Listen for order changes from Firebase ──
        if (firebaseReady && db) {
            db.ref('guestOrder').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                localStorage.setItem('wedding_guest_order', JSON.stringify(data));
                Object.keys(data).forEach(tableId => {
                    const tableGroup = document.getElementById('table-' + tableId);
                    if (!tableGroup) return;
                    const list = tableGroup.querySelector('.guest-list');
                    if (!list) return;
                    const order = data[tableId];
                    const items = [...list.querySelectorAll('.guest-item')];
                    const itemMap = {};
                    items.forEach(item => { itemMap[item.getAttribute('data-guest')] = item; });

                    order.forEach(guestKey => {
                        if (itemMap[guestKey]) list.appendChild(itemMap[guestKey]);
                    });
                    renumberList(list);
                });
            });
        }
    </script>
